<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦜 Пиратска Сага: Безкрайни Води | Giant Pirate Adventure RPG</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #030c1a 0%, #071c2c 100%);
            font-family: 'Segoe UI', 'Cinema', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Главен контейнер - гигантска пиратска империя */
        .game-container {
            max-width: 1500px;
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            border: 3px solid #c9a03d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            padding: 20px;
            transition: all 0.2s;
        }

        /* Заглавие */
        .pirate-header {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 4px 4px 0 #3a280b;
            background: linear-gradient(135deg, #f7d975, #b87c2e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 2px solid #cb9e5c;
            margin-bottom: 20px;
            padding-bottom: 8px;
        }

        /* Stats панел */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            background: #050e17cc;
            border-radius: 30px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid #7a5a2e;
            backdrop-filter: blur(4px);
            font-weight: bold;
        }

        .stat-card {
            background: #1f2a1e80;
            padding: 8px 12px;
            border-radius: 28px;
            color: #ffefc0;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            border-left: 5px solid #e0ac5f;
        }

        .stat-label {
            color: #c9ae6e;
        }

        .stat-value {
            color: #f3cf7a;
            font-weight: bold;
        }

        /* Игрална зона: карти и действия */
        .game-dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .map-adventure {
            flex: 2;
            min-width: 260px;
            background: #0b1420b3;
            border-radius: 32px;
            border: 2px solid #aa7c42;
            padding: 15px;
        }

        .action-panel {
            flex: 1.5;
            min-width: 250px;
            background: #0e1a1fb3;
            border-radius: 32px;
            border: 2px solid #8b693a;
            padding: 15px;
        }

        .combat-panel {
            background: #2e1c14cc;
            border-radius: 28px;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #b87c2e;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        button {
            background: #2c2416;
            border: 2px solid #dbb05c;
            color: #fad97c;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 60px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: monospace;
            letter-spacing: 1px;
            box-shadow: 0 3px 0 #3a2a10;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3a2a10;
        }

        button:hover {
            background: #4a3820;
            border-color: #f5c46b;
            color: #ffeaac;
        }

        .combat-btn {
            background: #631d1d;
            border-color: #e08e3a;
        }

        .log-area {
            background: #010a0fe6;
            border-radius: 24px;
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
            color: #d6d09b;
            border-top: 2px solid #a9742e;
        }

        .quest-card {
            background: #182018b3;
            border-radius: 24px;
            padding: 12px;
            margin-top: 10px;
        }

        h3 {
            margin: 0 0 8px 0;
            color: #eec97a;
            font-size: 1.2rem;
            border-left: 8px solid #c1943c;
            padding-left: 12px;
        }

        hr {
            border-color: #7a592e;
        }

        .enemy-stats {
            background: #3a281bb3;
            border-radius: 20px;
            padding: 10px;
            margin-top: 8px;
        }

        @media (max-width: 800px) {
            .stat-card { font-size: 0.75rem; }
            button { padding: 6px 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="pirate-header">☠️ ПИРАТСКА САГА: ПРОКЛЯТИЕТО НА ЗЛАТОТО ☠️</div>

    <div class="stats-panel" id="statsPanel"></div>

    <div class="game-dashboard">
        <div class="map-adventure">
            <h3>🏝️ СВЕТЪТ & ПЪТУВАНЕ</h3>
            <div id="locationName" style="font-size:1.2rem; background:#010d12; border-radius: 20px; padding: 8px; text-align:center;">Порт Роял</div>
            <div class="btn-group" id="travelButtons"></div>
            <div id="specialLocationActions"></div>
            <div class="combat-panel" id="combatSection" style="display:none;">
                <h3>⚔️ МОРСКА БИТКА ⚔️</h3>
                <div id="enemyStats"></div>
                <div class="btn-group" id="combatActions"></div>
            </div>
        </div>
        <div class="action-panel">
            <h3>🏴‍☠️ КАПИТАНСКИ ДЕЙСТВИЯ</h3>
            <div class="btn-group" id="portActions"></div>
            <div class="quest-card">
                <h3>📜 АКТИВНА ЗАДАЧА</h3>
                <div id="questDisplay">Търси съкровището на Дейви Джоунс</div>
                <button id="completeQuestBtn" style="margin-top:8px;">🏆 Изпълни задача (ако е готова)</button>
            </div>
            <div class="log-area" id="logMessages">
                ⚓ Добре дошъл, капитан! Слава и злато те очакват...<br>
                🌊 Плавай до други острови, търгувай и избери съдбата си.
            </div>
        </div>
    </div>
</div>

<script>
    // ======================== ГИГАНТСКА ПИРАТСКА RPG СТРУКТУРА ========================
    // --- Player / Ship stats ---
    let player = {
        name: "Черният Череп",
        level: 1,
        xp: 0,
        xpNext: 100,
        gold: 1250,
        reputation: 0,   // 0-100 (влияе на цени и събития)
        crew: 28,
        maxCrew: 45,
        ship: {
            name: "Отмъщението",
            hull: 110,
            maxHull: 110,
            cannons: 14,
            maxCannons: 24,
            cargoSpace: 80,
            speed: 12
        },
        supplies: { food: 85, rum: 32 },   // храна за пътуване, ром за събития
        cargo: { sugar: 6, spice: 3, silk: 1 },   // търговски стоки
        upgrades: { hullArmor: 0, gunpowder: 0 }
    };

    // Локации с координати и тип
    const locations = {
        "Порт Роял": { type: "port", desc: "Британски форт, богат пазар", distance: 0, goodsMod: 1.0, danger: 0.1 },
        "Тортуга": { type: "port", desc: "Разгулно пиратско пристанище", distance: 1, goodsMod: 0.85, danger: 0.25 },
        "Остров Череп": { type: "wild", desc: "Диви брегове и засади", distance: 2, goodsMod: 1.2, danger: 0.6 },
        "Затънтената лагуна": { type: "port", desc: "Тайна търговия с контрабанда", distance: 1.5, goodsMod: 0.7, danger: 0.4 },
        "Дяволския триъгълник": { type: "danger", desc: "Мистично място, огромни рискове", distance: 3, goodsMod: 2.0, danger: 0.9 }
    };
    let currentLocation = "Порт Роял";

    // Активна битка
    let combatActive = false;
    let currentEnemy = null;

    // Система за задачи (RPG епична)
    let activeQuest = {
        id: "treasure_map",
        name: "Съкровището на Морган",
        description: "Намери древния артефакт в Дяволския триъгълник и продай за 800 злата.",
        targetLocation: "Дяволския триъгълник",
        rewardGold: 800,
        rewardXP: 120,
        completed: false,
        progressFlag: false
    };

    // Помощни функции за лог
    function addLog(msg) {
        const logDiv = document.getElementById("logMessages");
        if(logDiv) {
            const p = document.createElement("div");
            p.innerHTML = `⚓ ${new Date().toLocaleTimeString().slice(0,5)} ➤ ${msg}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            while(logDiv.children.length > 25) logDiv.removeChild(logDiv.firstChild);
        }
    }

    // Update UI stats
    function updateUI() {
        const panel = document.getElementById("statsPanel");
        if(panel){
            panel.innerHTML = `
                <div class="stat-card"><span class="stat-label">🏴 Капитан</span><span class="stat-value">${player.name} (Lv.${player.level})</span></div>
                <div class="stat-card"><span class="stat-label">💰 Злато</span><span class="stat-value">${Math.floor(player.gold)}</span></div>
                <div class="stat-card"><span class="stat-label">⚔️ Екипаж</span><span class="stat-value">${player.crew}/${player.maxCrew}</span></div>
                <div class="stat-card"><span class="stat-label">⛵ Кораб</span><span class="stat-value">${player.ship.name} (📦трюм: ${getUsedCargo()}/${player.ship.cargoSpace})</span></div>
                <div class="stat-card"><span class="stat-label">🔫 Топове</span><span class="stat-value">${player.ship.cannons}/${player.ship.maxCannons}</span></div>
                <div class="stat-card"><span class="stat-label">🛡️ Здравина</span><span class="stat-value">${player.ship.hull}/${player.ship.maxHull}</span></div>
                <div class="stat-card"><span class="stat-label">🍖 Пров. (храна/ром)</span><span class="stat-value">${player.supplies.food} / ${player.supplies.rum}</span></div>
                <div class="stat-card"><span class="stat-label">✨ XP</span><span class="stat-value">${player.xp}/${player.xpNext}</span></div>
            `;
        }
        document.getElementById("locationName").innerHTML = `📍 ${currentLocation} — ${locations[currentLocation]?.desc || "диви води"}`;
        document.getElementById("questDisplay").innerHTML = activeQuest.completed ? "✅ Задача изпълнена! Намери нова в пристанище!" : `📌 ${activeQuest.name}<br>🎯 ${activeQuest.description}`;
        renderPortActions();
        renderTravelButtons();
        if(!combatActive) document.getElementById("combatSection").style.display = "none";
    }

    function getUsedCargo() {
        let total = (player.cargo.sugar||0)+(player.cargo.spice||0)+(player.cargo.silk||0);
        return total;
    }

    function checkLevelUp() {
        if(player.xp >= player.xpNext) {
            player.level++;
            player.xp -= player.xpNext;
            player.xpNext = Math.floor(player.xpNext * 1.3);
            player.maxCrew += 4;
            player.ship.maxHull += 12;
            player.ship.hull = player.ship.maxHull;
            player.ship.maxCannons = Math.min(36, player.ship.maxCannons+2);
            addLog(`🏆 ПОВИШЕНИЕ! Вече си ниво ${player.level}! Екипаж +4, корпус +12, топове +2 макс. АРИ!`);
            updateUI();
            if(player.xp >= player.xpNext) checkLevelUp();
        }
    }

    // ------ ПЪТУВАНЕ И СЛУЧАЙНИ СЪБИТИЯ ------
    function travelTo(locName) {
        if(combatActive) { addLog("В битка си! Не можеш да плаваш."); return; }
        if(locName === currentLocation) { addLog("Вече си в това пристанище."); return; }
        let dist = locations[locName].distance || 1;
        let foodCost = Math.max(1, Math.floor(dist * 2 + (player.crew/15)));
        if(player.supplies.food < foodCost) {
            addLog(`🍞 Нямаш достатъчно храна! Нужни ${foodCost}, имаш ${player.supplies.food}. Купи храна!`);
            return;
        }
        player.supplies.food -= foodCost;
        addLog(`🌊 Отплава към ${locName}... (изразходвана храна: ${foodCost})`);

        // Случайно събитие / морска битка
        let danger = locations[locName].danger || 0.2;
        let encounterRoll = Math.random();
        if(encounterRoll < danger + 0.1) {
            let enemyShip = generateEnemy();
            addLog(`⚠️ НАПАДЕНИЕ! ${enemyShip.name} се задава от мъглата! БИТКА!`);
            startCombat(enemyShip);
        } else {
            let randomEvent = Math.random();
            if(randomEvent < 0.2) {
                // Позитивно събитие
                let foundGold = Math.floor(Math.random() * 120) + 40;
                player.gold += foundGold;
                addLog(`🍀 Късмет! Намери плаваща съкровищница! +${foundGold} злато.`);
            } else if(randomEvent < 0.32) {
                let lostCrew = Math.floor(Math.random() * 4) + 1;
                player.crew = Math.max(5, player.crew - lostCrew);
                addLog(`🌪️ Буря отнесе ${lostCrew} моряци! Екипажът намаля.`);
            } else if(randomEvent < 0.4 && player.supplies.rum > 0) {
                let rumUsed = Math.min(3, player.supplies.rum);
                player.supplies.rum -= rumUsed;
                player.crew = Math.min(player.maxCrew, player.crew+2);
                addLog(`🍻 Ромово вдъхновение! +2 morale и 2-ма нови пирати се присъединиха.`);
            }
        }
        currentLocation = locName;
        checkQuestProgress();
        updateUI();
        if(!combatActive) addLog(`🚢 Пристигна в ${currentLocation}.`);
    }

    function generateEnemy() {
        let variants = [
            { name: "Кралски фрегат", hull: 95, cannons: 18, crew: 32, goldReward: 380, xpReward: 65, lootBase: 120 },
            { name: "Пиратски бриг", hull: 70, cannons: 14, crew: 28, goldReward: 220, xpReward: 45, lootBase: 80 },
            { name: "Летящият холандец (призрак)", hull: 130, cannons: 22, crew: 40, goldReward: 720, xpReward: 150, lootBase: 300 },
            { name: "Търговски галеон", hull: 88, cannons: 10, crew: 22, goldReward: 450, xpReward: 70, lootBase: 200 }
        ];
        let idx = Math.floor(Math.random() * variants.length);
        let e = {...variants[idx]};
        e.currentHull = e.hull;
        e.currentCrew = e.crew;
        return e;
    }

    // БОЙНА СИСТЕМА (стратегическа)
    function startCombat(enemy) {
        combatActive = true;
        currentEnemy = enemy;
        document.getElementById("combatSection").style.display = "block";
        renderCombatUI();
    }

    function renderCombatUI() {
        if(!currentEnemy) return;
        const enemyDiv = document.getElementById("enemyStats");
        enemyDiv.innerHTML = `<div class="enemy-stats">☠️ ВРАГ: ${currentEnemy.name} ☠️<br>
        🛡️ Корпус: ${currentEnemy.currentHull}/${currentEnemy.hull}<br>
        ⚔️ Екипаж: ${currentEnemy.currentCrew}/${currentEnemy.crew}<br>
        🔫 Топове: ${currentEnemy.cannons}</div>`;
        const combatActionsDiv = document.getElementById("combatActions");
        combatActionsDiv.innerHTML = `
            <button class="combat-btn" id="combatFire">🔥 Гръмни с топове!</button>
            <button class="combat-btn" id="combatBoard">🏴‍☠️ Абордаж!</button>
            <button class="combat-btn" id="combatRepair">🛠️ Бърз ремонт (20 злато)</button>
            <button class="combat-btn" id="combatFlee">💨 Бягство</button>
        `;
        document.getElementById("combatFire")?.addEventListener("click", combatFire);
        document.getElementById("combatBoard")?.addEventListener("click", combatBoard);
        document.getElementById("combatRepair")?.addEventListener("click", combatRepair);
        document.getElementById("combatFlee")?.addEventListener("click", combatFlee);
    }

    function combatFire() {
        if(!combatActive) return;
        let playerDamage = Math.floor((player.ship.cannons * 4) + (Math.random() * 15) + (player.level * 2));
        let enemyDamage = Math.floor((currentEnemy.cannons * 3.5) + (Math.random() * 12));
        currentEnemy.currentHull -= playerDamage;
        player.ship.hull -= enemyDamage;
        addLog(`💥 Вашите топове нанасят ${playerDamage} щети! Врагът ви удря с ${enemyDamage}!`);
        if(player.ship.hull <= 0) { defeatCombat(); return; }
        if(currentEnemy.currentHull <= 0) { victoryCombat(); return; }
        // enemy counterattack (crew loss)
        let crewLoss = Math.floor(Math.random() * 6) + 2;
        player.crew = Math.max(1, player.crew - crewLoss);
        addLog(`⚔️ Вражеските стрелци убиха ${crewLoss} от екипажа!`);
        if(player.crew <= 0) { defeatCombat(); return; }
        renderCombatUI();
        updateUI();
    }

    function combatBoard() {
        if(!combatActive) return;
        let playerPower = player.crew * (1 + player.level * 0.2);
        let enemyPower = currentEnemy.currentCrew * 0.9;
        let roll = Math.random();
        if(playerPower > enemyPower + (roll * 15)) {
            addLog("🏴‍☠️ Успешен абордаж! Унищожавате вражеския капитан!");
            victoryCombat();
        } else {
            let loss = Math.floor(Math.random() * 12) + 5;
            player.crew = Math.max(1, player.crew - loss);
            addLog(`😭 Провален абордаж! Загубихте ${loss} души!`);
            if(player.crew <= 0) defeatCombat();
            else {
                let counter = Math.floor(Math.random() * 15);
                player.ship.hull -= counter;
                addLog(`🧨 Вражески отговор: корпусът пострада с ${counter}`);
                if(player.ship.hull <= 0) defeatCombat();
            }
        }
        renderCombatUI(); updateUI();
    }

    function combatRepair() {
        if(player.gold < 20) { addLog("Нямаш злато за ремонт!"); return; }
        player.gold -= 20;
        let repair = Math.floor(Math.random() * 25) + 15;
        player.ship.hull = Math.min(player.ship.maxHull, player.ship.hull + repair);
        addLog(`🔧 Ремонт! Възстановени ${repair} точки корпус.`);
        // врагът атакува докато ремонтираш
        let punish = Math.floor(Math.random() * 18);
        player.ship.hull -= punish;
        addLog(`💢 Врагът ви атакува по време на ремонт! -${punish} корпус.`);
        if(player.ship.hull <= 0) defeatCombat();
        renderCombatUI(); updateUI();
    }

    function combatFlee() {
        let chance = 0.4 + (player.ship.speed / 40) + (player.level * 0.05);
        if(Math.random() < chance) {
            addLog("🏃‍♂️ Успя да избягаш! Битката приключи.");
            endCombat();
        } else {
            addLog("❌ Опитът за бягство провален! Врагът нанася тежък удар!");
            let dmg = Math.floor(Math.random() * 35) + 10;
            player.ship.hull -= dmg;
            if(player.ship.hull <= 0) defeatCombat();
            else renderCombatUI();
            updateUI();
        }
    }

    function victoryCombat() {
        addLog(`🏆 ПОБЕДА! Потушихте ${currentEnemy.name}!`);
        let goldGain = currentEnemy.goldReward + Math.floor(Math.random() * 100);
        let xpGain = currentEnemy.xpReward + Math.floor(Math.random() * 30);
        player.gold += goldGain;
        player.xp += xpGain;
        addLog(`💰 +${goldGain} злато, +${xpGain} опит.`);
        let lootCargo = Math.floor(Math.random() * 4);
        if(lootCargo > 0) {
            player.cargo.sugar = (player.cargo.sugar || 0) + Math.floor(Math.random() * 3);
            addLog(`📦 Плячка: захарен тръстик добавен в трюма.`);
        }
        checkLevelUp();
        endCombat();
    }

    function defeatCombat() {
        addLog(`💀 ЗАГУБА! Корабът ви е унищожен... Оцелелите се спасяват, но губите половината си злато и стоки.`);
        player.gold = Math.floor(player.gold * 0.5);
        player.cargo = { sugar: Math.floor((player.cargo.sugar||0)/2), spice: Math.floor((player.cargo.spice||0)/2), silk: Math.floor((player.cargo.silk||0)/2) };
        player.ship.hull = Math.max(20, Math.floor(player.ship.maxHull * 0.4));
        player.crew = Math.max(8, Math.floor(player.crew * 0.6));
        player.supplies.food = Math.max(8, player.supplies.food-10);
        addLog("Оцеляваш на сал и достигаш до най-близкото пристанище.");
        currentLocation = "Порт Роял";
        endCombat();
        updateUI();
    }

    function endCombat() {
        combatActive = false;
        currentEnemy = null;
        document.getElementById("combatSection").style.display = "none";
        updateUI();
    }

    // ПОРТОВИ ДЕЙСТВИЯ: търговия, надстройки, наемане и ремонт
    function renderPortActions() {
        let portDiv = document.getElementById("portActions");
        if(!portDiv) return;
        if(locations[currentLocation]?.type === "port" || currentLocation === "Тортуга" || currentLocation === "Затънтената лагуна") {
            portDiv.innerHTML = `
                <button id="tradeBtn">📦 ТЪРГОВИЯ (пазар)</button>
                <button id="recruitBtn">🍺 НАЕМИ ЕКИПАЖ (50 злато +5 crew)</button>
                <button id="repairShipBtn">🛠️ РЕМОНТ (40 злато +40 корпус)</button>
                <button id="upgradeCannonsBtn">🔫 НАДГРАДИ ТОПОВЕ (300 злато +2 топ/макс)</button>
                <button id="buySuppliesBtn">🍖 КУПИ ПРОВИЗИИ (храна+ром 100 злато)</button>
            `;
            document.getElementById("tradeBtn")?.addEventListener("click", openTradeMenu);
            document.getElementById("recruitBtn")?.addEventListener("click", () => {
                if(player.gold>=50 && player.crew<player.maxCrew) { player.gold-=50; player.crew = Math.min(player.maxCrew, player.crew+5); addLog("5 нови пирати се присъединиха!"); updateUI();}
                else addLog("Нямаш злато или екипажът е пълен!");
            });
            document.getElementById("repairShipBtn")?.addEventListener("click", () => {
                if(player.gold>=40) { player.gold-=40; player.ship.hull = Math.min(player.ship.maxHull, player.ship.hull+40); addLog("Корабът е ремонтиран!"); updateUI();}
                else addLog("Недостатъчно злато!");
            });
            document.getElementById("upgradeCannonsBtn")?.addEventListener("click", () => {
                if(player.gold>=300 && player.ship.cannons < player.ship.maxCannons) { player.gold-=300; player.ship.cannons = Math.min(player.ship.maxCannons, player.ship.cannons+2); addLog("Топовете са надградени!"); updateUI();}
                else addLog("Нямаш злато или си на максимум!");
            });
            document.getElementById("buySuppliesBtn")?.addEventListener("click", () => {
                if(player.gold>=100){ player.gold-=100; player.supplies.food+=40; player.supplies.rum+=20; addLog("Добавени храна +40, ром +20."); updateUI();}
                else addLog("Нямаш 100 злато!");
            });
        } else {
            portDiv.innerHTML = `<button disabled>🌊 Див бряг - няма търговия, само битки</button>`;
        }
    }

    function openTradeMenu() {
        let sugarPrice = Math.floor(18 + Math.random() * 12);
        let spicePrice = 27 + Math.floor(Math.random()*15);
        let silkPrice = 65 + Math.floor(Math.random()*30);
        let gold = player.gold;
        let action = prompt(`📊 ПАЗАР (${currentLocation}) \n Захар: ${sugarPrice} злато (имаш: ${player.cargo.sugar||0})\n Подправки: ${spicePrice} злато (имаш: ${player.cargo.spice||0})\n Коприна: ${silkPrice} злато (имаш: ${player.cargo.silk||0})\n\nНапишете "купи захар 5" или "продай подправки 3" / "продай всичко" :`);
        if(!action) return;
        let parts = action.toLowerCase().split(" ");
        if(parts[0] === "купи" && parts[2]) {
            let item = parts[1];
            let qty = parseInt(parts[2]);
            if(isNaN(qty)) return;
            let cost = 0;
            if(item === "захар") cost = sugarPrice*qty;
            else if(item === "подправки") cost = spicePrice*qty;
            else if(item === "коприна") cost = silkPrice*qty;
            else { addLog("Невалидна стока"); return; }
            if(cost <= player.gold && (getUsedCargo()+qty) <= player.ship.cargoSpace) {
                player.gold -= cost;
                if(item === "захар") player.cargo.sugar = (player.cargo.sugar||0)+qty;
                if(item === "подправки") player.cargo.spice = (player.cargo.spice||0)+qty;
                if(item === "коприна") player.cargo.silk = (player.cargo.silk||0)+qty;
                addLog(`Купено ${qty} ${item} за ${cost} злато.`);
            } else addLog("Няма място или пари!");
        }
        else if(parts[0] === "продай" && parts[2]) {
            let item = parts[1];
            let qty = parseInt(parts[2]);
            let have = (item==="захар"?player.cargo.sugar:item==="подправки"?player.cargo.spice:player.cargo.silk)||0;
            if(qty > have) { addLog("Нямаш толкова стока!"); return; }
            let income = 0;
            if(item === "захар") income = sugarPrice*qty*0.7;
            else if(item === "подправки") income = spicePrice*qty*0.7;
            else income = silkPrice*qty*0.7;
            player.gold += Math.floor(income);
            if(item === "захар") player.cargo.sugar -= qty;
            if(item === "подправки") player.cargo.spice -= qty;
            if(item === "коприна") player.cargo.silk -= qty;
            addLog(`Продадено ${qty} ${item} за ${Math.floor(income)} злато.`);
        } else if(action === "продай всичко") {
            let totalVal = 0;
            totalVal += (player.cargo.sugar||0)*sugarPrice*0.7;
            totalVal += (player.cargo.spice||0)*spicePrice*0.7;
            totalVal += (player.cargo.silk||0)*silkPrice*0.7;
            player.gold += Math.floor(totalVal);
            player.cargo = { sugar:0, spice:0, silk:0 };
            addLog(`Продадохте целия товар за ${Math.floor(totalVal)} злато!`);
        }
        updateUI();
    }

    function renderTravelButtons() {
        let travelDiv = document.getElementById("travelButtons");
        travelDiv.innerHTML = "";
        for(let loc in locations) {
            let btn = document.createElement("button");
            btn.innerText = `⛵ ${loc}`;
            btn.onclick = () => travelTo(loc);
            travelDiv.appendChild(btn);
        }
    }

    function checkQuestProgress() {
        if(!activeQuest.completed && activeQuest.targetLocation === currentLocation && activeQuest.id === "treasure_map" && !activeQuest.progressFlag) {
            activeQuest.progressFlag = true;
            addLog(`🏝️ Открихте древния артефакт в ${currentLocation}! Върнете се в пристанище за награда.`);
        }
    }

    document.getElementById("completeQuestBtn")?.addEventListener("click", () => {
        if(activeQuest.completed) { addLog("Задачата вече е завършена! Очаквай нова."); return; }
        if(activeQuest.progressFlag) {
            player.gold += activeQuest.rewardGold;
            player.xp += activeQuest.rewardXP;
            addLog(`✨ ЗАДАЧА ИЗПЪЛНЕНА! +${activeQuest.rewardGold} злато, +${activeQuest.rewardXP} опит. Слава за теб!`);
            activeQuest.completed = true;
            checkLevelUp();
            updateUI();
        } else {
            addLog(`Задачата още не е изпълнена. Трябва да стигнеш до ${activeQuest.targetLocation} и да намериш артефакта!`);
        }
    });

    // Старт на играта
    updateUI();
    addLog("🤴 Гигантска пиратска стратегическа RPG е готова! Управлявай кораба, търгувай, воювай и стани крал на пиратите!");
</script>
</body>
</html>
