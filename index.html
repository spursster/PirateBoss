<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pirate Boss · Гигантска пиратска стратегия</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #02111f, #01060c);
            font-family: 'Segoe UI', 'Courier New', 'Roboto', system-ui, monospace;
            padding: 16px;
        }

        /* Главен контейнер - напълно адаптивен */
        .game-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(0, 5, 12, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            border: 2px solid #c9a43b;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,215,120,0.2);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* Заглавие */
        .boss-header {
            text-align: center;
            padding: 18px 12px 12px;
            background: #030d15b3;
            border-bottom: 2px solid #e2b13b;
        }
        .boss-header h1 {
            margin: 0;
            font-size: clamp(1.8rem, 8vw, 3.2rem);
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffd966, #b47c2e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 0 #1e2a1a;
            font-weight: 900;
        }
        .boss-header p {
            margin: 5px 0 0;
            color: #e9c891;
            font-size: 0.8rem;
        }

        /* Статистики - гъвкава мрежа */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            padding: 16px 20px;
            background: #051018aa;
            border-bottom: 1px solid #7a5d2e;
        }
        .stat-card {
            background: #0e1b1fc9;
            border-radius: 60px;
            padding: 8px 14px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            font-weight: bold;
            color: #f7e5b5;
            font-size: 0.9rem;
            backdrop-filter: blur(2px);
            border-left: 4px solid #e4aa4a;
        }
        .stat-label {
            opacity: 0.85;
        }
        .stat-value {
            color: #ffdd99;
            font-family: monospace;
            font-size: 1.1rem;
        }

        /* Двуколонна структура за голям екран, на малко -> колона */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }
        .map-panel {
            flex: 2;
            min-width: 240px;
            background: #07121ed4;
            border-radius: 40px;
            padding: 18px;
            border: 1px solid #b48b3a;
        }
        .action-panel {
            flex: 1.5;
            min-width: 260px;
            background: #07121ed4;
            border-radius: 40px;
            padding: 18px;
            border: 1px solid #b48b3a;
        }

        /* Бутони и контроли */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0 10px;
        }
        button {
            background: #2c2416;
            border: none;
            border-bottom: 3px solid #cf9f44;
            color: #ffe1a0;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.08s linear;
            font-family: monospace;
            flex: 1 0 auto;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }
        @media (hover: hover) {
            button:hover {
                background: #4f3a22;
                color: #ffefb9;
            }
        }
        .combat-btn {
            background: #4e2a1f;
            border-bottom-color: #cf6f3a;
        }
        .log-area {
            background: #010a0fe0;
            border-radius: 28px;
            padding: 14px;
            height: 180px;
            overflow-y: auto;
            font-size: 0.8rem;
            font-family: monospace;
            color: #dad28b;
            margin-top: 15px;
            border: 1px solid #7a602e;
        }
        .quest-card {
            background: #121d1cbf;
            border-radius: 28px;
            padding: 12px;
            margin: 12px 0;
        }
        h3 {
            margin: 0 0 10px 0;
            color: #fdcd7a;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 6px solid #ecb151;
            padding-left: 12px;
        }
        .location-name {
            background: #030f17;
            border-radius: 60px;
            text-align: center;
            padding: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #f5cf8b;
            margin-bottom: 12px;
        }
        .enemy-box {
            background: #2f241be0;
            border-radius: 28px;
            padding: 12px;
            margin-top: 10px;
        }
        hr {
            border-color: #745e34;
        }
        @media (max-width: 680px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .dashboard {
                padding: 12px;
            }
            button {
                padding: 8px 12px;
                font-size: 0.75rem;
            }
            .stat-card {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="boss-header">
        <h1>🏴‍☠️ PIRATE BOSS 🏴‍☠️</h1>
        <p>Стратегия | Приключение | Морски битки</p>
    </div>

    <div class="stats-grid" id="statsPanel"></div>

    <div class="dashboard">
        <!-- ЛЯВ ПАНЕЛ: СВЯТ И ПЪТУВАНЕ -->
        <div class="map-panel">
            <h3>🌍 КАРИБСКИ ВОДИ</h3>
            <div class="location-name" id="locationName">Порт Роял</div>
            <div class="button-group" id="travelButtons"></div>
            <div id="combatZone" style="display:none;">
                <div class="enemy-box" id="enemyStatsBox"></div>
                <div class="button-group" id="combatControls"></div>
            </div>
        </div>

        <!-- ДЕСЕН ПАНЕЛ: ДЕЙСТВИЯ, ЗАДАЧИ, ЛОГ -->
        <div class="action-panel">
            <h3>⚓ КАПИТАНСКИ ЗАПОВЕДИ</h3>
            <div class="button-group" id="portButtons"></div>
            <div class="quest-card">
                <h3>📜 ТЕКУЩА ЗАДАЧА</h3>
                <div id="questDesc">Търси съкровището на древния крал</div>
                <button id="completeQuestBtn" style="margin-top: 10px; width:100%;">🏆 ЗАВЪРШИ ЗАДАЧА</button>
            </div>
            <div class="log-area" id="gameLog">
                ⚓ Добре дошел, Pirate Boss!<br>
                🌊 Плавай, търгувай и граби, за да станеш легенда.
            </div>
        </div>
    </div>
</div>

<script>
    // ====================== PIRATE BOSS - ГИГАНТСКА СТРАТЕГИЧЕСКА RPG ======================
    // ----- ИГРАЧ И КОРАБ -----
    let player = {
        name: "Капитан Черния",
        level: 1,
        xp: 0,
        xpNeeded: 110,
        gold: 1350,
        reputation: 20,     // влияе на цени
        crew: 32,
        maxCrew: 48,
        ship: {
            name: "Морски Демон",
            hull: 125,
            maxHull: 125,
            cannons: 16,
            maxCannons: 28,
            cargoLimit: 95,
            speed: 13
        },
        supplies: { food: 110, rum: 42 },
        cargo: { sugar: 4, spice: 2, silk: 1, wood: 3 },
        upgrades: { armorPlating: 0, powderCharge: 0 }
    };

    // ----- ЛОКАЦИИ -----
    const locations = {
        "Порт Роял": { type: "port", danger: 0.12, distance: 1, desc: "Голямо пристанище, чудесен пазар", tradeMod: 1.0 },
        "Тортуга": { type: "port", danger: 0.22, distance: 1.2, desc: "Пиратско свърталище, евтини стоки", tradeMod: 0.85 },
        "Остров Череп": { type: "wild", danger: 0.55, distance: 1.8, desc: "Диви земи, пълно с опасности", tradeMod: 1.3 },
        "Синьо Лагуна": { type: "port", danger: 0.18, distance: 1.4, desc: "Скрито пристанище за контрабанда", tradeMod: 0.75 },
        "Дяволския триъгълник": { type: "danger", danger: 0.85, distance: 2.5, desc: "Мистична зла, невероятни богатства", tradeMod: 2.2 }
    };
    let currentLocation = "Порт Роял";
    let combatActive = false;
    let currentEnemy = null;

    // ----- КВЕСТ СИСТЕМА -----
    let activeQuest = {
        id: "treasure_of_el_dorado",
        name: "Златото на Ел Дорадо",
        description: "Намери древния идол в Дяволския триъгълник и го продай на търговец.",
        targetLocation: "Дяволския триъгълник",
        rewardGold: 950,
        rewardXp: 150,
        completed: false,
        relicFound: false
    };

    // ----- helper лог -----
    function addLog(msg) {
        const logDiv = document.getElementById("gameLog");
        if(logDiv) {
            const line = document.createElement("div");
            line.innerHTML = `⚓ ${new Date().toLocaleTimeString().slice(0,5)} · ${msg}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
            while(logDiv.children.length > 28) logDiv.removeChild(logDiv.firstChild);
        }
    }

    // пресмята използван товар
    function usedCargo() {
        let total = (player.cargo.sugar||0)+(player.cargo.spice||0)+(player.cargo.silk||0)+(player.cargo.wood||0);
        return total;
    }

    // обновява целия UI
    function updateUI() {
        const statsDiv = document.getElementById("statsPanel");
        statsDiv.innerHTML = `
            <div class="stat-card"><span class="stat-label">🏴‍☠️ Капитан</span><span class="stat-value">${player.name} (Lv.${player.level})</span></div>
            <div class="stat-card"><span class="stat-label">💰 Злато</span><span class="stat-value">${Math.floor(player.gold)}</span></div>
            <div class="stat-card"><span class="stat-label">⚔️ Екипаж</span><span class="stat-value">${player.crew}/${player.maxCrew}</span></div>
            <div class="stat-card"><span class="stat-label">⛵ Кораб</span><span class="stat-value">${player.ship.name} (📦${usedCargo()}/${player.ship.cargoLimit})</span></div>
            <div class="stat-card"><span class="stat-label">🔫 Топове</span><span class="stat-value">${player.ship.cannons}/${player.ship.maxCannons}</span></div>
            <div class="stat-card"><span class="stat-label">🛡️ Здравина</span><span class="stat-value">${player.ship.hull}/${player.ship.maxHull}</span></div>
            <div class="stat-card"><span class="stat-label">🍗 Провизии (храна/ром)</span><span class="stat-value">${player.supplies.food} / ${player.supplies.rum}</span></div>
            <div class="stat-card"><span class="stat-label">✨ Опит</span><span class="stat-value">${player.xp}/${player.xpNeeded}</span></div>
        `;
        document.getElementById("locationName").innerHTML = `🏝️ ${currentLocation}<span style="font-size:0.7rem;"> — ${locations[currentLocation].desc}</span>`;
        document.getElementById("questDesc").innerHTML = activeQuest.completed ? "✅ Задача изпълнена! Намери нова в пристанище." : `📌 ${activeQuest.name}<br>🎯 ${activeQuest.description}`;
        renderPortActions();
        renderTravelButtons();
        if(!combatActive) document.getElementById("combatZone").style.display = "none";
        else document.getElementById("combatZone").style.display = "block";
    }

    // ниване
    function checkLevelUp() {
        if(player.xp >= player.xpNeeded) {
            player.level++;
            player.xp -= player.xpNeeded;
            player.xpNeeded = Math.floor(player.xpNeeded * 1.28);
            player.maxCrew += 5;
            player.ship.maxHull += 15;
            player.ship.hull = player.ship.maxHull;
            player.ship.maxCannons = Math.min(38, player.ship.maxCannons+2);
            addLog(`🏅 ПОВИШЕНИЕ! Вече си ниво ${player.level}! Екипаж +5, корпус +15, топове +2 макс.`);
            updateUI();
            if(player.xp >= player.xpNeeded) checkLevelUp();
        }
    }

    // ---- ГЕНЕРИРАНЕ НА ВРАГ ----
    function generateEnemy() {
        const enemies = [
            { name: "Кралски ловец", hull: 100, cannons: 18, crew: 34, goldReward: 410, xpReward: 70, lootExtra: 90 },
            { name: "Пиратски разбойник", hull: 75, cannons: 15, crew: 30, goldReward: 250, xpReward: 50, lootExtra: 75 },
            { name: "Призрачен галеон", hull: 145, cannons: 24, crew: 42, goldReward: 880, xpReward: 180, lootExtra: 310 },
            { name: "Търговски флот", hull: 92, cannons: 12, crew: 26, goldReward: 500, xpReward: 85, lootExtra: 160 }
        ];
        let chosen = {...enemies[Math.floor(Math.random()*enemies.length)]};
        chosen.currentHull = chosen.hull;
        chosen.currentCrew = chosen.crew;
        return chosen;
    }

    // ---------- БОЙНА СИСТЕМА ----------
    function startCombat(enemy) {
        combatActive = true;
        currentEnemy = enemy;
        renderCombatUI();
        addLog(`⚔️ БИТКА! ${enemy.name} напада!`);
    }

    function renderCombatUI() {
        if(!currentEnemy) return;
        document.getElementById("enemyStatsBox").innerHTML = `
            <div style="font-weight:bold;">☠️ ${currentEnemy.name}</div>
            <div>🏴 Корпус: ${currentEnemy.currentHull}/${currentEnemy.hull}</div>
            <div>👥 Екипаж: ${currentEnemy.currentCrew}/${currentEnemy.crew}</div>
            <div>🔫 Топове: ${currentEnemy.cannons}</div>
        `;
        const combatDiv = document.getElementById("combatControls");
        combatDiv.innerHTML = `
            <button class="combat-btn" id="cannonBtn">🔥 ТОПОВЕ</button>
            <button class="combat-btn" id="boardBtn">🏴‍☠️ АБОРДАЖ</button>
            <button class="combat-btn" id="repairBtn">🛠️ РЕМОНТ (35💰)</button>
            <button class="combat-btn" id="fleeBtn">💨 БЯГСТВО</button>
        `;
        document.getElementById("cannonBtn")?.addEventListener("click", combatCannon);
        document.getElementById("boardBtn")?.addEventListener("click", combatBoard);
        document.getElementById("repairBtn")?.addEventListener("click", combatRepair);
        document.getElementById("fleeBtn")?.addEventListener("click", combatFlee);
    }

    function combatCannon() {
        if(!combatActive) return;
        let playerDamage = Math.floor((player.ship.cannons * 4.5) + Math.random() * 18 + (player.level*1.5));
        let enemyDamage = Math.floor((currentEnemy.cannons * 3.8) + Math.random() * 15);
        currentEnemy.currentHull -= playerDamage;
        player.ship.hull -= enemyDamage;
        addLog(`💥 Вашите топове нанасят ${playerDamage} щети! Врагът отвръща с ${enemyDamage}!`);
        if(player.ship.hull <= 0) return defeatCombat();
        if(currentEnemy.currentHull <= 0) return victoryCombat();
        let crewLoss = Math.floor(Math.random() * 5) + 2;
        player.crew = Math.max(2, player.crew - crewLoss);
        addLog(`🏹 Загубени ${crewLoss} моряци от ответен огън!`);
        if(player.crew <= 0) defeatCombat();
        else renderCombatUI();
        updateUI();
    }
    function combatBoard() {
        if(!combatActive) return;
        let power = (player.crew + player.level*2) * (Math.random()*0.6 + 0.7);
        let enemyPower = currentEnemy.currentCrew * 1.0;
        if(power > enemyPower) {
            addLog("🏴‍☠️ УСПЕШЕН АБОРДАЖ! Врагът е разбит!");
            victoryCombat();
        } else {
            let loss = Math.floor(Math.random() * 14) + 6;
            player.crew = Math.max(2, player.crew - loss);
            addLog(`😵 Абордажът се проваля! Губите ${loss} души.`);
            if(player.crew <= 0) defeatCombat();
            else {
                let counter = Math.floor(Math.random() * 20);
                player.ship.hull -= counter;
                addLog(`💢 Вражеска контраатака: -${counter} корпус`);
                if(player.ship.hull <= 0) defeatCombat();
                else renderCombatUI();
            }
        }
        updateUI();
    }
    function combatRepair() {
        if(player.gold < 35) { addLog("Нямаш 35 злато за ремонт!"); return; }
        player.gold -= 35;
        let repair = Math.floor(Math.random() * 28) + 18;
        player.ship.hull = Math.min(player.ship.maxHull, player.ship.hull + repair);
        addLog(`🔧 Ремонт +${repair} корпус.`);
        let punish = Math.floor(Math.random() * 18);
        player.ship.hull -= punish;
        addLog(`⚡ Врагът се възползва: -${punish} корпус.`);
        if(player.ship.hull <= 0) defeatCombat();
        else renderCombatUI();
        updateUI();
    }
    function combatFlee() {
        let chance = 0.45 + (player.ship.speed / 35) + (player.level * 0.04);
        if(Math.random() < chance) {
            addLog("🏃‍♂️ Успяваш да избягаш от битката!");
            endCombat();
        } else {
            addLog("❌ Бягството се проваля! Врагът атакува жестоко!");
            let dmg = Math.floor(Math.random() * 32) + 12;
            player.ship.hull -= dmg;
            if(player.ship.hull <= 0) defeatCombat();
            else renderCombatUI();
            updateUI();
        }
    }
    function victoryCombat() {
        addLog(`🏆 ПОБЕДА! Унищожихте ${currentEnemy.name}!`);
        let goldGain = currentEnemy.goldReward + Math.floor(Math.random() * 130);
        let xpGain = currentEnemy.xpReward + Math.floor(Math.random() * 40);
        player.gold += goldGain;
        player.xp += xpGain;
        addLog(`💰 +${goldGain} злато, +${xpGain} опит.`);
        let lootRoll = Math.random();
        if(lootRoll > 0.6) { player.cargo.wood = (player.cargo.wood||0)+Math.floor(Math.random()*4)+1; addLog("📦 Намерени дърва за ремонт!"); }
        if(lootRoll > 0.8) { player.cargo.spice = (player.cargo.spice||0)+1; addLog("🌶️ Плячка: подправки"); }
        checkLevelUp();
        endCombat();
    }
    function defeatCombat() {
        addLog(`💀 ПОРАЖЕНИЕ! Корабът е разбит... Оцелелите губят половината злато и част от стоките.`);
        player.gold = Math.floor(player.gold * 0.5);
        player.cargo = { sugar: Math.floor((player.cargo.sugar||0)/2), spice: Math.floor((player.cargo.spice||0)/2), silk: Math.floor((player.cargo.silk||0)/2), wood: Math.floor((player.cargo.wood||0)/2) };
        player.ship.hull = Math.max(20, Math.floor(player.ship.maxHull * 0.4));
        player.crew = Math.max(8, Math.floor(player.crew * 0.6));
        player.supplies.food = Math.max(12, player.supplies.food - 12);
        currentLocation = "Порт Роял";
        endCombat();
        updateUI();
        addLog("Спасяваш се до Порт Роял...");
    }
    function endCombat() {
        combatActive = false;
        currentEnemy = null;
        document.getElementById("combatZone").style.display = "none";
        updateUI();
    }

    // ----- ПЪТУВАНЕ -----
    function travelTo(locName) {
        if(combatActive) { addLog("В битка си, не можеш да плаваш!"); return; }
        if(locName === currentLocation) return;
        let dist = locations[locName].distance || 1;
        let foodCost = Math.max(1, Math.floor(dist * 2.5 + player.crew/12));
        if(player.supplies.food < foodCost) { addLog(`Недостиг на храна! Трябват ${foodCost}, имаш ${player.supplies.food}.`); return; }
        player.supplies.food -= foodCost;
        addLog(`🌊 Отплаване към ${locName} (храна -${foodCost})`);

        let danger = locations[locName].danger;
        if(Math.random() < danger + 0.08) {
            let enemy = generateEnemy();
            addLog(`⚠️ СРЕЩА В МОРЕТО! ${enemy.name} напада!`);
            startCombat(enemy);
        } else {
            let eventRand = Math.random();
            if(eventRand < 0.18) {
                let bonus = Math.floor(Math.random() * 140) + 30;
                player.gold += bonus;
                addLog(`🍀 Плаващ съд с плячка! +${bonus} злато.`);
            } else if(eventRand < 0.32) {
                let lossC = Math.floor(Math.random() * 5)+1;
                player.crew = Math.max(4, player.crew-lossC);
                addLog(`🌪️ Буря отне ${lossC} моряци.`);
            } else if(eventRand < 0.44 && player.supplies.rum > 2) {
                player.supplies.rum -= 2;
                player.crew = Math.min(player.maxCrew, player.crew+3);
                addLog(`🍻 Ромов пир! +3 пирати в екипажа.`);
            }
        }
        currentLocation = locName;
        checkQuestProgress();
        updateUI();
        if(!combatActive) addLog(`✅ Пристигнахте в ${currentLocation}.`);
    }
    function checkQuestProgress() {
        if(!activeQuest.completed && activeQuest.targetLocation === currentLocation && !activeQuest.relicFound && activeQuest.id === "treasure_of_el_dorado") {
            activeQuest.relicFound = true;
            addLog(`🔱 Намерихте древния идол в ${currentLocation}! Върнете се в пристанище за да завършите задачата.`);
        }
    }

    // ----- ПОРТОВИ ДЕЙСТВИЯ (търговия, надстройки) -----
    function renderPortActions() {
        let portDiv = document.getElementById("portButtons");
        if(!portDiv) return;
        if(locations[currentLocation]?.type === "port" || currentLocation === "Тортуга" || currentLocation === "Синьо Лагуна" || currentLocation === "Порт Роял") {
            portDiv.innerHTML = `
                <button id="tradeAct">📦 ТЪРГОВИЯ</button>
                <button id="hireCrew">⚓ НАЕМИ ЕКИПАЖ (60💰 +5 души)</button>
                <button id="repairShip">🔧 РЕМОНТ (45💰 +45 корпус)</button>
                <button id="upgradeCannons">🔫 НАДГРАДИ ТОПОВЕ (380💰 +2 топове)</button>
                <button id="buyRumFood">🍖 КУПИ ПРОВИЗИИ (90💰 +40 храна, +20 ром)</button>
            `;
            document.getElementById("tradeAct")?.addEventListener("click", openTradeMenu);
            document.getElementById("hireCrew")?.addEventListener("click", () => {
                if(player.gold >= 60 && player.crew < player.maxCrew) { player.gold -= 60; player.crew = Math.min(player.maxCrew, player.crew+5); addLog("5 нови пирати се присъединиха!"); updateUI();}
                else addLog("Нямаш злато или екипаж пълен");
            });
            document.getElementById("repairShip")?.addEventListener("click", () => {
                if(player.gold >= 45) { player.gold -= 45; player.ship.hull = Math.min(player.ship.maxHull, player.ship.hull+45); addLog("Ремонт успешен!"); updateUI();}
                else addLog("Недостатъчно злато");
            });
            document.getElementById("upgradeCannons")?.addEventListener("click", () => {
                if(player.gold >= 380 && player.ship.cannons < player.ship.maxCannons) { player.gold -= 380; player.ship.cannons = Math.min(player.ship.maxCannons, player.ship.cannons+2); addLog("Топовете са подобрени!"); updateUI();}
                else addLog("Нямаш пари или си на максимум");
            });
            document.getElementById("buyRumFood")?.addEventListener("click", () => {
                if(player.gold >= 90) { player.gold -= 90; player.supplies.food += 40; player.supplies.rum += 20; addLog("Заредени провизии +40 храна, +20 ром"); updateUI();}
                else addLog("Нужни 90 злато");
            });
        } else {
            portDiv.innerHTML = `<button disabled>🏝️ Див бряг - няма пристанищни услуги</button>`;
        }
    }

    function openTradeMenu() {
        let sugarPrice = 14 + Math.floor(Math.random() * 14);
        let spicePrice = 24 + Math.floor(Math.random() * 18);
        let silkPrice = 70 + Math.floor(Math.random() * 40);
        let woodPrice = 8 + Math.floor(Math.random() * 7);
        let msg = `📊 ПАЗАР (${currentLocation})\n
Захар: ${sugarPrice}💰 (имаш: ${player.cargo.sugar||0})
Подправки: ${spicePrice}💰 (имаш: ${player.cargo.spice||0})
Коприна: ${silkPrice}💰 (имаш: ${player.cargo.silk||0})
Дърво: ${woodPrice}💰 (имаш: ${player.cargo.wood||0})
\nФормат: "купи захар 3" или "продай подправки 2" / "продай всичко"`;
        let action = prompt(msg);
        if(!action) return;
        let parts = action.toLowerCase().split(" ");
        if(parts[0] === "купи" && parts[2]) {
            let item = parts[1];
            let qty = parseInt(parts[2]);
            if(isNaN(qty)) return;
            let cost = 0;
            if(item === "захар") cost = sugarPrice*qty;
            else if(item === "подправки") cost = spicePrice*qty;
            else if(item === "коприна") cost = silkPrice*qty;
            else if(item === "дърво") cost = woodPrice*qty;
            else { addLog("Невалидна стока"); return; }
            if(cost <= player.gold && (usedCargo()+qty) <= player.ship.cargoLimit) {
                player.gold -= cost;
                if(item === "захар") player.cargo.sugar = (player.cargo.sugar||0)+qty;
                else if(item === "подправки") player.cargo.spice = (player.cargo.spice||0)+qty;
                else if(item === "коприна") player.cargo.silk = (player.cargo.silk||0)+qty;
                else if(item === "дърво") player.cargo.wood = (player.cargo.wood||0)+qty;
                addLog(`Купено ${qty} ${item} за ${cost}💰.`);
            } else addLog("Няма място или пари!");
        } else if(parts[0] === "продай" && parts[2]) {
            let item = parts[1];
            let qty = parseInt(parts[2]);
            let have = 0;
            if(item === "захар") have = player.cargo.sugar||0;
            else if(item === "подправки") have = player.cargo.spice||0;
            else if(item === "коприна") have = player.cargo.silk||0;
            else if(item === "дърво") have = player.cargo.wood||0;
            if(qty > have) { addLog("Нямаш толкова"); return; }
            let price = 0;
            if(item === "захар") price = Math.floor(sugarPrice*0.65);
            else if(item === "подправки") price = Math.floor(spicePrice*0.65);
            else if(item === "коприна") price = Math.floor(silkPrice*0.65);
            else price = Math.floor(woodPrice*0.7);
            let income = price * qty;
            player.gold += income;
            if(item === "захар") player.cargo.sugar -= qty;
            else if(item === "подправки") player.cargo.spice -= qty;
            else if(item === "коприна") player.cargo.silk -= qty;
            else if(item === "дърво") player.cargo.wood -= qty;
            addLog(`Продадено ${qty} ${item} за ${income}💰`);
        } else if(action === "продай всичко") {
            let total = 0;
            total += (player.cargo.sugar||0)*Math.floor(sugarPrice*0.65);
            total += (player.cargo.spice||0)*Math.floor(spicePrice*0.65);
            total += (player.cargo.silk||0)*Math.floor(silkPrice*0.65);
            total += (player.cargo.wood||0)*Math.floor(woodPrice*0.7);
            player.gold += total;
            player.cargo = { sugar:0, spice:0, silk:0, wood:0 };
            addLog(`Продаден целият товар за ${total}💰!`);
        }
        updateUI();
    }

    function renderTravelButtons() {
        let travelDiv = document.getElementById("travelButtons");
        travelDiv.innerHTML = "";
        for(let loc in locations) {
            let btn = document.createElement("button");
            btn.innerText = `⛵ ${loc}`;
            btn.onclick = () => travelTo(loc);
            travelDiv.appendChild(btn);
        }
    }

    // ----- КВЕСТ ЗАВЪРШВАНЕ -----
    document.getElementById("completeQuestBtn")?.addEventListener("click", () => {
        if(activeQuest.completed) { addLog("Задачата вече е завършена!"); return; }
        if(activeQuest.relicFound) {
            player.gold += activeQuest.rewardGold;
            player.xp += activeQuest.rewardXp;
            addLog(`🏆 ЗАДАЧА ИЗПЪЛНЕНА! +${activeQuest.rewardGold}💰, +${activeQuest.rewardXp} опит.`);
            activeQuest.completed = true;
            checkLevelUp();
            updateUI();
        } else {
            addLog(`Задачата изисква да намерите артефакта в ${activeQuest.targetLocation}.`);
        }
    });

    // инициализация
    updateUI();
    addLog("🏴‍☠️ Pirate Boss е тук! Плавай, търгувай, победи всички врагове и стани крал на пиратите!");
</script>
</body>
</html>
